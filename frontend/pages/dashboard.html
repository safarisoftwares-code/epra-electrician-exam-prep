<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - EPRA Exam Prep</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .nav-links { display: flex; gap: 5px; }
        .nav-links a { 
            padding: 8px 16px; 
            border-radius: 6px; 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500;
            transition: all 0.3s;
        }
        .nav-links a:hover, .nav-links a.active { 
            background: rgba(255,255,255,0.15); 
        }
        .nav-right { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        .nav-user { 
            color: #ff9800; 
            font-weight: 600; 
            font-size: 0.95rem; 
        }
        .premium-locked {
            cursor: pointer;
            position: relative;
        }
        .premium-locked:hover {
            border-color: #ff9800 !important;
        }
        .lock-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container" style="display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1400px;">
            <!-- Left: Brand + Navigation -->
            <div style="display: flex; align-items: center; gap: 30px;">
                <div class="nav-brand">
                    <span>⚡ EPRA Exam Prep</span>
                </div>
                <div class="nav-links">
                    <a href="dashboard.html" class="active">📊 Dashboard</a>
                    <a href="exam.html">📝 Exam</a>
                    <a href="study.html">📚 Study</a>
                    <a href="regulations.html" id="navRegulations">📋 Regulations</a>
                    <a href="upgrade.html" style="color:#ff9800;">💎 Upgrade</a>
                </div>
            </div>
            
            <!-- Right: User + Logout -->
            <div class="nav-right">
                <span class="nav-user" id="navStudentName">👤 Student</span>
                <button onclick="EPRA.logout('student')" class="btn btn-outline" style="padding: 8px 16px; border-color: #f44336; color: #ff8a80; font-size: 0.9rem;">
                    🚪 Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1 class="welcome-text">Welcome, <span id="studentName">Electrician</span>!</h1>
            <div id="premiumStatus"></div>
        </div>

        <div id="message-container"></div>

        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h2 id="totalExams">0</h2>
                <p>Total Exams</p>
            </div>
            <div class="stat-card">
                <h2 id="passedExams">0</h2>
                <p>Passed Exams</p>
            </div>
            <div class="stat-card">
                <h2 id="averageScore">0%</h2>
                <p>Average Score</p>
            </div>
            <div class="stat-card">
                <h2 id="passRate">0%</h2>
                <p>Pass Rate</p>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Quick Actions</h3>
            </div>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <button onclick="window.location.href='exam.html'" class="btn btn-primary">
                    <i class="fas fa-pencil-alt"></i> Start New Exam
                </button>
                <button onclick="window.location.href='study.html'" class="btn btn-outline" style="color:#1a237e;border-color:#1a237e;">
                    <i class="fas fa-book"></i> Study Mode
                </button>
                <button id="regulationsBtn" class="btn btn-outline premium-locked" style="color:#1a237e;border-color:#1a237e;">
                    <i class="fas fa-gavel"></i> Regulations Library <span id="regLockIcon" style="margin-left: 5px;">🔒</span>
                </button>
                <button onclick="window.location.href='upgrade.html'" class="btn btn-outline" style="color:#ff9800;border-color:#ff9800;">
                    <i class="fas fa-crown"></i> Upgrade to Premium
                </button>
            </div>
        </div>

        <!-- Recent Exams -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Recent Exams</h3>
                <div style="display: flex; gap: 10px;">
                    <button onclick="viewAllExams()" class="btn btn-small btn-outline" style="color:#1a237e;border-color:#1a237e;">
                        <i class="fas fa-list"></i> View All
                    </button>
                    <button onclick="clearHistory()" class="btn btn-small btn-danger">
                        <i class="fas fa-trash"></i> Clear History
                    </button>
                </div>
            </div>
            <div id="recentExams" style="overflow-x: auto;">
                <p style="text-align: center; color: #999;">Loading...</p>
            </div>
        </div>
    </div>

    <!-- Exam Review Modal -->
    <div id="reviewModal" class="modal">
        <div class="modal-content" style="max-width: 800px; max-height: 80vh; overflow-y: auto;">
            <div class="modal-header">
                <h3 style="color: #1a237e;">📝 Exam Review - Marking Scheme</h3>
                <button class="modal-close" onclick="closeReviewModal()">&times;</button>
            </div>
            <div id="reviewContent"></div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        if (!EPRA.requireAuth('student')) {
            window.location.href = 'login.html';
        }

        let isPremiumUser = false;

        async function loadDashboard() {
            try {
                const data = await EPRA.apiRequest('/student/dashboard', 'GET', null, 'student');
                
                isPremiumUser = data.premium.is_premium;
                
                // Update student name in both places
                document.getElementById('studentName').textContent = data.user.full_name;
                document.getElementById('navStudentName').textContent = '👤 ' + data.user.full_name;
                
                // Update stats
                document.getElementById('totalExams').textContent = data.stats.total_exams;
                document.getElementById('passedExams').textContent = data.stats.passed_exams;
                document.getElementById('averageScore').textContent = data.stats.average_score + '%';
                document.getElementById('passRate').textContent = data.stats.pass_rate + '%';
                
                // Update premium status
                const premiumDiv = document.getElementById('premiumStatus');
                if (data.premium.is_premium) {
                    premiumDiv.innerHTML = `
                        <span class="premium-badge">
                            <i class="fas fa-crown"></i> Premium Active - ${data.premium.days_remaining} days remaining
                        </span>
                    `;
                } else {
                    premiumDiv.innerHTML = `
                        <span class="free-badge">
                            Free Plan - <a href="upgrade.html" style="color:#ff9800;">Upgrade for full access</a>
                        </span>
                    `;
                }
                
                // Update Regulations Library button
                updateRegulationsButton();
                
                displayRecentExams(data.recent_exams);
                
            } catch (error) {
                EPRA.showMessage('Failed to load dashboard: ' + error.message, 'error', 'message-container');
                if (error.message.includes('Invalid token')) {
                    EPRA.logout('student');
                }
            }
        }

        function updateRegulationsButton() {
            const regBtn = document.getElementById('regulationsBtn');
            const regLock = document.getElementById('regLockIcon');
            const navReg = document.getElementById('navRegulations');
            
            if (isPremiumUser) {
                // Premium - unlocked
                if (regLock) regLock.innerHTML = '✅';
                if (regBtn) {
                    regBtn.title = 'Access Regulations Library';
                    regBtn.style.borderColor = '#4caf50';
                    regBtn.onclick = function() { window.location.href = 'regulations.html'; };
                }
                if (navReg) {
                    navReg.href = 'regulations.html';
                    navReg.style.color = '#fff';
                }
            } else {
                // Free - locked
                if (regLock) regLock.innerHTML = '🔒';
                if (regBtn) {
                    regBtn.title = 'Premium Only - Upgrade to Unlock';
                    regBtn.onclick = function() {
                        if (confirm('📋 Regulations Library is a Premium feature.\n\nUpgrade to access:\n• BS 7671 Wiring Regulations\n• Kenya Power Distribution Code\n• Energy Act 2019\n• EPRA Licensing Regulations\n• Building Regulations\n• Safety Standards & Guidance\n\nOnly KES 2,500/year!\n\nGo to Upgrade page?')) {
                            window.location.href = 'upgrade.html';
                        }
                    };
                }
                if (navReg) {
                    navReg.href = '#';
                    navReg.style.color = '#999';
                    navReg.onclick = function(e) {
                        e.preventDefault();
                        if (confirm('📋 Regulations Library is a Premium feature.\n\nUpgrade to unlock full access.\n\nGo to Upgrade page?')) {
                            window.location.href = 'upgrade.html';
                        }
                    };
                }
            }
        }

        function displayRecentExams(recentExams) {
            const examsDiv = document.getElementById('recentExams');
            
            if (recentExams && recentExams.length > 0) {
                let html = `
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Questions</th>
                                    <th>Score</th>
                                    <th>Result</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                recentExams.forEach(exam => {
                    const resultBadge = exam.passed ? 
                        '<span style="color:#4caf50;font-weight:600;">✓ PASSED</span>' : 
                        '<span style="color:#f44336;font-weight:600;">✗ FAILED</span>';
                    
                    html += `
                        <tr>
                            <td>${EPRA.formatDate(exam.started_at)}</td>
                            <td>${exam.exam_type}</td>
                            <td>${exam.total_questions}</td>
                            <td>${exam.score_percentage}%</td>
                            <td>${resultBadge}</td>
                            <td>
                                <button onclick="viewExamReview(${exam.id})" class="btn btn-small btn-primary">
                                    📝 Review
                                </button>
                            </td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table></div>';
                examsDiv.innerHTML = html;
            } else {
                examsDiv.innerHTML = '<p style="text-align:center;padding:2rem;color:#999;">No exams taken yet. Start your first exam!</p>';
            }
        }

        async function viewExamReview(examId) {
            try {
                const data = await EPRA.apiRequest(`/exam/review/${examId}`, 'GET', null, 'student');
                
                let reviewHTML = '';
                
                data.questions.forEach((question, index) => {
                    let statusIcon = question.is_correct ? '✅ Correct' : 
                                    question.user_answer === 'Not answered' ? '⚠️ Not Answered' : '❌ Incorrect';
                    
                    reviewHTML += `
                        <div style="background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; 
                                    border-left: 5px solid ${question.is_correct ? '#4caf50' : question.user_answer === 'Not answered' ? '#ff9800' : '#f44336'};
                                    box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                            <h4 style="margin-bottom: 10px;">Question ${index + 1}: ${statusIcon}</h4>
                            <p style="font-weight: 500;">${question.question_text}</p>
                            <div style="margin: 10px 0;">
                                ${question.options.map(option => {
                                    let style = 'padding: 8px; margin: 3px 0; border-radius: 6px; border: 1px solid #ddd;';
                                    let label = '';
                                    if (option === question.correct_answer) { style += 'background: #e8f5e9; border-color: #4caf50;'; label = ' ✓'; }
                                    if (option === question.user_answer && option !== question.correct_answer) { style += 'background: #ffebee; border-color: #f44336;'; label = ' ← Your Answer'; }
                                    return `<div style="${style}">${option}${label}</div>`;
                                }).join('')}
                            </div>
                            ${question.explanation ? `<div style="background: #e3f2fd; padding: 10px; border-radius: 6px; margin-top: 10px;"><strong>📖 Explanation:</strong> ${question.explanation}</div>` : ''}
                        </div>
                    `;
                });
                
                document.getElementById('reviewContent').innerHTML = reviewHTML;
                document.getElementById('reviewModal').classList.add('active');
                
            } catch (error) {
                EPRA.showMessage('Failed to load exam review: ' + error.message, 'error', 'message-container');
            }
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').classList.remove('active');
        }

        window.onclick = function(event) {
            const modal = document.getElementById('reviewModal');
            if (event.target === modal) modal.classList.remove('active');
        }

        async function clearHistory() {
            if (!confirm('Delete ALL exam history? This cannot be undone.')) return;
            if (!confirm('Are you absolutely sure?')) return;
            
            try {
                const data = await EPRA.apiRequest('/exam/history/clear', 'DELETE', null, 'student');
                EPRA.showMessage('✅ ' + data.message, 'success', 'message-container');
                setTimeout(() => loadDashboard(), 1000);
            } catch (error) {
                EPRA.showMessage('Failed to clear history: ' + error.message, 'error', 'message-container');
            }
        }

        function viewAllExams() {
            window.location.href = 'exam-history.html';
        }

        loadDashboard();
    </script>
</body>
</html>
