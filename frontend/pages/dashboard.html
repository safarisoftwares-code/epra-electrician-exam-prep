<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - EPRA Exam Prep</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span>⚡ Student Dashboard</span>
            </div>
            <div class="nav-actions">
                <a href="exam.html" class="btn btn-primary">Take Exam</a>
                <a href="study.html" class="btn btn-outline">Study Mode</a>
                <a href="upgrade.html" class="btn btn-outline" style="color:#ff9800;border-color:#ff9800;">💎 Upgrade</a>
                <button onclick="EPRA.logout('student')" class="btn btn-outline">Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1 class="welcome-text">Welcome, <span id="studentName">Electrician</span>!</h1>
            <div id="premiumStatus"></div>
        </div>

        <div id="message-container"></div>

        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h2 id="totalExams">0</h2>
                <p>Total Exams</p>
            </div>
            <div class="stat-card">
                <h2 id="passedExams">0</h2>
                <p>Passed Exams</p>
            </div>
            <div class="stat-card">
                <h2 id="averageScore">0%</h2>
                <p>Average Score</p>
            </div>
            <div class="stat-card">
                <h2 id="passRate">0%</h2>
                <p>Pass Rate</p>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Quick Actions</h3>
            </div>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <button onclick="window.location.href='exam.html'" class="btn btn-primary">
                    <i class="fas fa-pencil-alt"></i> Start New Exam
                </button>
                <button onclick="window.location.href='study.html'" class="btn btn-outline" style="color:#1a237e;border-color:#1a237e;">
                    <i class="fas fa-book"></i> Study Mode
                </button>
                <button onclick="window.location.href='upgrade.html'" class="btn btn-outline" style="color:#ff9800;border-color:#ff9800;">
                    <i class="fas fa-crown"></i> Upgrade to Premium
                </button>
            </div>
        </div>

        <!-- Recent Exams -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Recent Exams</h3>
                <div style="display: flex; gap: 10px;">
                    <button onclick="viewAllExams()" class="btn btn-small btn-outline" style="color:#1a237e;border-color:#1a237e;">
                        <i class="fas fa-list"></i> View All
                    </button>
                    <button onclick="clearHistory()" class="btn btn-small btn-danger">
                        <i class="fas fa-trash"></i> Clear History
                    </button>
                </div>
            </div>
            <div id="recentExams" style="overflow-x: auto;">
                <p style="text-align: center; color: #999;">Loading...</p>
            </div>
        </div>
    </div>

    <!-- Exam Review Modal -->
    <div id="reviewModal" class="modal">
        <div class="modal-content" style="max-width: 800px; max-height: 80vh; overflow-y: auto;">
            <div class="modal-header">
                <h3 style="color: #1a237e;">📝 Exam Review - Marking Scheme</h3>
                <button class="modal-close" onclick="closeReviewModal()">&times;</button>
            </div>
            <div id="reviewContent"></div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        // Check authentication
        if (!EPRA.requireAuth('student')) {
            window.location.href = 'login.html';
        }

        // Load dashboard data
        async function loadDashboard() {
            try {
                const data = await EPRA.apiRequest('/student/dashboard', 'GET', null, 'student');
                
                // Update student name
                document.getElementById('studentName').textContent = data.user.full_name;
                
                // Update stats
                document.getElementById('totalExams').textContent = data.stats.total_exams;
                document.getElementById('passedExams').textContent = data.stats.passed_exams;
                document.getElementById('averageScore').textContent = data.stats.average_score + '%';
                document.getElementById('passRate').textContent = data.stats.pass_rate + '%';
                
                // Update premium status
                const premiumDiv = document.getElementById('premiumStatus');
                if (data.premium.is_premium) {
                    premiumDiv.innerHTML = `
                        <span class="premium-badge">
                            <i class="fas fa-crown"></i> Premium Active - ${data.premium.days_remaining} days remaining
                        </span>
                    `;
                } else {
                    premiumDiv.innerHTML = `
                        <span class="free-badge">
                            Free Plan - <a href="upgrade.html" style="color:#ff9800;">Upgrade for full access</a>
                        </span>
                    `;
                }
                
                // Display recent exams
                displayRecentExams(data.recent_exams);
                
            } catch (error) {
                EPRA.showMessage('Failed to load dashboard: ' + error.message, 'error', 'message-container');
                
                if (error.message.includes('Invalid token')) {
                    EPRA.logout('student');
                }
            }
        }

        function displayRecentExams(recentExams) {
            const examsDiv = document.getElementById('recentExams');
            
            if (recentExams && recentExams.length > 0) {
                let html = `
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Questions</th>
                                    <th>Score</th>
                                    <th>Result</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                recentExams.forEach(exam => {
                    const resultBadge = exam.passed ? 
                        '<span style="color:#4caf50;font-weight:600;">✓ PASSED</span>' : 
                        '<span style="color:#f44336;font-weight:600;">✗ FAILED</span>';
                    
                    html += `
                        <tr>
                            <td>${EPRA.formatDate(exam.started_at)}</td>
                            <td>${exam.exam_type}</td>
                            <td>${exam.total_questions}</td>
                            <td>${exam.score_percentage}%</td>
                            <td>${resultBadge}</td>
                            <td>
                                <button onclick="viewExamReview(${exam.id})" class="btn btn-small btn-primary">
                                    📝 Review
                                </button>
                            </td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table></div>';
                examsDiv.innerHTML = html;
            } else {
                examsDiv.innerHTML = '<p style="text-align:center;padding:2rem;color:#999;">No exams taken yet. Start your first exam!</p>';
            }
        }

        // View exam review in modal
        async function viewExamReview(examId) {
            try {
                const data = await EPRA.apiRequest(`/exam/review/${examId}`, 'GET', null, 'student');
                
                // Build review HTML
                let reviewHTML = '';
                
                data.questions.forEach((question, index) => {
                    let statusClass = 'not-answered';
                    let statusIcon = '⚠️';
                    
                    if (question.user_answer === 'Not answered') {
                        statusClass = 'not-answered';
                        statusIcon = '⚠️ Not Answered';
                    } else if (question.is_correct) {
                        statusClass = 'correct';
                        statusIcon = '✅ Correct';
                    } else {
                        statusClass = 'incorrect';
                        statusIcon = '❌ Incorrect';
                    }
                    
                    reviewHTML += `
                        <div style="background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; 
                                    border-left: 5px solid ${question.is_correct ? '#4caf50' : question.user_answer === 'Not answered' ? '#ff9800' : '#f44336'};
                                    box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                            <h4 style="margin-bottom: 10px;">
                                Question ${index + 1}: ${statusIcon}
                                <span style="font-size: 0.85rem; color: #666;">(${question.category})</span>
                            </h4>
                            <p style="font-weight: 500; margin-bottom: 15px;">${question.question_text}</p>
                            
                            <div style="margin-bottom: 15px;">
                                ${question.options.map(option => {
                                    let bgColor = 'white';
                                    let borderColor = '#ddd';
                                    let label = '';
                                    
                                    if (option === question.correct_answer) {
                                        bgColor = '#e8f5e9';
                                        borderColor = '#4caf50';
                                        label = ' ✓ (Correct Answer)';
                                    }
                                    if (option === question.user_answer && option !== question.correct_answer) {
                                        bgColor = '#ffebee';
                                        borderColor = '#f44336';
                                        label = ' ← (Your Answer)';
                                    }
                                    if (option === question.correct_answer && option === question.user_answer) {
                                        bgColor = '#e8f5e9';
                                        borderColor = '#4caf50';
                                        label = ' ✓ (Correct - Your Answer)';
                                    }
                                    
                                    return `<div style="padding: 10px; margin: 5px 0; border-radius: 8px; 
                                                  border: 1px solid ${borderColor}; background: ${bgColor};">
                                        ${option}${label}
                                    </div>`;
                                }).join('')}
                            </div>
                            
                            ${question.explanation ? `
                                <div style="background: #e3f2fd; padding: 15px; border-radius: 8px; margin-top: 10px; 
                                            border-left: 4px solid #2196f3;">
                                    <strong>📖 Explanation:</strong>
                                    <p style="margin-top: 5px;">${question.explanation}</p>
                                    ${question.regulation_reference ? `<p style="margin-top: 8px;"><strong>📋 Regulation:</strong> ${question.regulation_reference}</p>` : ''}
                                    ${question.practical_tip ? `<p style="margin-top: 8px;"><strong>💡 Practical Tip:</strong> ${question.practical_tip}</p>` : ''}
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                
                document.getElementById('reviewContent').innerHTML = reviewHTML;
                document.getElementById('reviewModal').classList.add('active');
                
            } catch (error) {
                EPRA.showMessage('Failed to load exam review: ' + error.message, 'error', 'message-container');
            }
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').classList.remove('active');
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('reviewModal');
            if (event.target === modal) {
                modal.classList.remove('active');
            }
        }

        // Clear exam history
        async function clearHistory() {
            if (!confirm('Are you sure you want to delete ALL your exam history? This cannot be undone.')) {
                return;
            }
            
            // Double confirmation
            if (!confirm('This will permanently delete all your exam records. Are you absolutely sure?')) {
                return;
            }
            
            try {
                const data = await EPRA.apiRequest('/exam/history/clear', 'DELETE', null, 'student');
                EPRA.showMessage(`✅ ${data.message}`, 'success', 'message-container');
                
                // Reload dashboard after short delay
                setTimeout(() => {
                    loadDashboard();
                }, 1000);
                
            } catch (error) {
                EPRA.showMessage('Failed to clear history: ' + error.message, 'error', 'message-container');
            }
        }

        // View all exams
        function viewAllExams() {
            window.location.href = 'exam-history.html';
        }

        // Load on page start
        loadDashboard();
    </script>
</body>
</html>
