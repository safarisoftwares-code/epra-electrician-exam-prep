<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - EPRA Exam Prep</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span>⚡ EPRA Exam Prep</span>
            </div>
            <a href="../index.html" class="btn btn-outline">← Home</a>
        </div>
    </nav>

    <div class="form-container">
        <h2>Student Login</h2>
        
        <div id="message-container"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem;">
            Don't have an account? <a href="register.html" style="color: #ff9800;">Register here</a>
        </p>
    </div>

    <script src="../js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const data = await EPRA.apiRequest('/auth/login', 'POST', {
                    email: email,
                    password: password
                }, 'student');
                
                // Store token
                EPRA.setToken(data.access_token, 'student');
                
                // Show success and redirect
                EPRA.showMessage('Login successful! Redirecting...', 'success', 'message-container');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } catch (error) {
                EPRA.showMessage(error.message || 'Login failed', 'error', 'message-container');
            }
        });
    </script>
</body>
</html>
