<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Login - EPRA</title><link rel="stylesheet" href="../css/style.css"></head><body><nav class="navbar"><h2>EPRA Login</h2><a href="../index.html" class="btn btn-outline">Home</a></nav><div class="form-container"><h2 style="text-align:center;color:#1a237e">Login</h2><form id="f"><input type="email" id="email" placeholder="Email" required><input type="password" id="password" placeholder="Password" required><button type="submit" class="btn btn-primary">Login</button></form><p style="text-align:center;margin-top:15px">No account? <a href="register.html">Register</a></p><p id="msg" style="color:red;text-align:center"></p></div><script>document.getElementById("f").addEventListener("submit",async(e)=>{e.preventDefault();try{const r=await fetch("http://localhost:5000/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:document.getElementById("email").value,password:document.getElementById("password").value})});const d=await r.json();r.ok?(localStorage.setItem("access_token",d.access_token),window.location.href="dashboard.html"):document.getElementById("msg").textContent=d.error}catch(err){document.getElementById("msg").textContent="Server not running?"}});</script></body></html>
