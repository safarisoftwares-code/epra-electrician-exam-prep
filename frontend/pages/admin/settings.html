<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Settings - Admin</title><link rel="stylesheet" href="../../css/style.css"></head>
<body><nav class="navbar"><h2>Admin Settings</h2><div><a href="dashboard.html">Dashboard</a><a href="keys.html">Keys</a><a href="payments.html">Payments</a><a href="subscribers.html">Subscribers</a><a href="settings.html">Settings</a><button onclick="logout()" class="btn btn-outline">Logout</button></div></nav>
<div style="max-width:600px;margin:2rem auto;padding:1rem">
<div class="question-box"><h2>Change Password</h2>
<form id="passForm"><input type="password" id="current_password" placeholder="Current Password" required style="width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px"><input type="password" id="new_password" placeholder="New Password" required style="width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px"><button type="submit" class="btn btn-primary" style="width:100%">Change Password</button></form><p id="passMsg" style="text-align:center;margin-top:10px"></p></div>
<div class="question-box" style="margin-top:20px"><h2>Update Profile</h2>
<form id="profileForm"><input type="text" id="username" placeholder="Username" style="width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px"><input type="email" id="email" placeholder="Email" style="width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px"><input type="text" id="full_name" placeholder="Full Name" style="width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px"><button type="submit" class="btn btn-primary" style="width:100%">Update Profile</button></form><p id="profileMsg" style="text-align:center;margin-top:10px"></p></div></div>
<script>
var t=localStorage.getItem("admin_token");if(!t)location.href="login.html";
fetch("/api/admin/profile",{headers:{"Authorization":"Bearer "+t}}).then(r=>r.json()).then(d=>{document.getElementById("username").value=d.username||"";document.getElementById("email").value=d.email||"";document.getElementById("full_name").value=d.full_name||""});
document.getElementById("passForm").addEventListener("submit",function(e){e.preventDefault();fetch("/api/admin/change-password",{method:"POST",headers:{"Authorization":"Bearer "+t,"Content-Type":"application/json"},body:JSON.stringify({current_password:document.getElementById("current_password").value,new_password:document.getElementById("new_password").value})}).then(r=>r.json()).then(d=>{document.getElementById("passMsg").innerHTML=d.error?"<span style='color:red'>"+d.error+"</span>":"<span style='color:green'>"+d.message+"</span>"})});
document.getElementById("profileForm").addEventListener("submit",function(e){e.preventDefault();fetch("/api/admin/profile",{method:"PUT",headers:{"Authorization":"Bearer "+t,"Content-Type":"application/json"},body:JSON.stringify({username:document.getElementById("username").value,email:document.getElementById("email").value,full_name:document.getElementById("full_name").value})}).then(r=>r.json()).then(d=>{document.getElementById("profileMsg").innerHTML=d.error?"<span style='color:red'>"+d.error+"</span>":"<span style='color:green'>Profile updated!</span>"})});
function logout(){localStorage.removeItem("admin_token");location.href="login.html"}
</script></body></html>
