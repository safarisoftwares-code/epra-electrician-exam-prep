<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Admin Login</title><link rel="stylesheet" href="../../css/style.css"></head>
<body style="background:#1a237e"><div style="max-width:400px;margin:100px auto;padding:30px;background:#fff;border-radius:15px"><h2 style="text-align:center;color:#1a237e">Admin Panel</h2><form id="f"><input type="text" id="username" placeholder="Username" required style="width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px"><input type="password" id="password" placeholder="Password" required style="width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px"><button type="submit" class="btn btn-primary" style="width:100%">Login</button></form><p id="msg" style="text-align:center;margin-top:10px;color:red"></p></div>
<script>document.getElementById("f").addEventListener("submit",async function(e){e.preventDefault();try{var r=await fetch("http://localhost:5000/api/admin/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:document.getElementById("username").value,password:document.getElementById("password").value})});var d=await r.json();if(r.ok){localStorage.setItem("admin_token",d.access_token);location.href="dashboard.html"}else{document.getElementById("msg").textContent=d.error}}catch(err){document.getElementById("msg").textContent="Error connecting"}});</script></body></html>
