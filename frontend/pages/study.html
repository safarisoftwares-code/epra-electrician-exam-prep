<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Mode - EPRA Exam Prep</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span>⚡ Study Mode</span>
            </div>
            <div class="nav-actions">
                <a href="dashboard.html" class="btn btn-outline">← Dashboard</a>
                <a href="exam.html" class="btn btn-primary">Take Exam</a>
            </div>
        </div>
    </nav>

    <div class="exam-container">
        <div id="premiumBanner" style="margin-bottom: 1rem;"></div>
        
        <div class="exam-header">
            <div>
                <span style="color: #666;">Question</span>
                <span id="currentQuestionNum" style="font-weight: bold; color: #1a237e;">1</span>
                <span style="color: #666;">/</span>
                <span id="totalQuestions" style="color: #666;">0</span>
            </div>
            <button onclick="loadNewQuestions()" class="btn btn-outline" style="color:#1a237e;border-color:#1a237e;">
                <i class="fas fa-sync-alt"></i> New Questions
            </button>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>

        <div class="question-box" id="questionBox">
            <p style="text-align: center; color: #999;">Loading questions...</p>
        </div>

        <div class="exam-actions">
            <button id="prevBtn" onclick="previousQuestion()" class="btn btn-outline" style="color:#1a237e;border-color:#1a237e;">
                ← Previous
            </button>
            <button id="showAnswerBtn" onclick="revealAnswer()" class="btn btn-primary">
                <i class="fas fa-lightbulb"></i> Show Answer
            </button>
            <button id="nextBtn" onclick="nextQuestion()" class="btn btn-primary">
                Next →
            </button>
        </div>
    </div>

    <div id="message-container"></div>

    <script src="../js/app.js"></script>
    <script>
        if (!EPRA.requireAuth('student')) {
            window.location.href = 'login.html';
        }

        let questions = [];
        let currentIndex = 0;
        let answerRevealed = false;

        async function loadStudyQuestions() {
            try {
                const data = await EPRA.apiRequest('/study/questions', 'GET', null, 'student');
                questions = data.questions;
                currentIndex = 0;
                answerRevealed = false;
                
                document.getElementById('totalQuestions').textContent = questions.length;
                
                // Premium banner
                const bannerDiv = document.getElementById('premiumBanner');
                if (data.is_premium) {
                    bannerDiv.innerHTML = '<div class="alert alert-success">' +
                        '<i class="fas fa-crown"></i> Premium Study Mode - All questions unlocked' +
                        '</div>';
                } else {
                    bannerDiv.innerHTML = '<div class="alert alert-warning">' +
                        '<i class="fas fa-info-circle"></i> Free Study Mode - 5 questions. ' +
                        '<a href="upgrade.html" style="color:#ff9800;">Upgrade for unlimited access</a>' +
                        '</div>';
                }
                
                if (questions.length > 0) {
                    loadQuestion();
                } else {
                    document.getElementById('questionBox').innerHTML = 
                        '<p style="text-align:center;color:#999;">No questions available</p>';
                }
                
            } catch (error) {
                EPRA.showMessage('Failed to load questions: ' + error.message, 'error', 'message-container');
            }
        }

        function loadQuestion() {
            if (currentIndex >= questions.length) {
                currentIndex = 0;
            }
            
            const question = questions[currentIndex];
            answerRevealed = false;
            
            document.getElementById('currentQuestionNum').textContent = currentIndex + 1;
            
            // Update progress
            const progress = ((currentIndex + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            const questionBox = document.getElementById('questionBox');
            questionBox.innerHTML = `
                <div class="question-number">Category: ${question.category} | Difficulty: ${question.difficulty}</div>
                <div class="question-text">${question.question_text}</div>
                <div class="options-list">
                    ${question.options.map(option => `
                        <div class="option" onclick="this.classList.toggle('selected')">${option}</div>
                    `).join('')}
                </div>
                <div id="answerReveal" style="display: none;">
                    <div class="explanation-box">
                        <h4>✓ Correct Answer: ${question.correct_answer}</h4>
                        ${question.explanation ? `<p><strong>Explanation:</strong> ${question.explanation}</p>` : ''}
                        ${question.regulation_reference ? `<p><strong>Regulation:</strong> ${question.regulation_reference}</p>` : ''}
                        ${question.practical_tip ? `<p><strong>💡 Practical Tip:</strong> ${question.practical_tip}</p>` : ''}
                        ${question.calculation_steps ? `<p><strong>📐 Calculation:</strong></p><pre>${question.calculation_steps}</pre>` : ''}
                    </div>
                </div>
            `;
            
            document.getElementById('showAnswerBtn').textContent = '💡 Show Answer';
            document.getElementById('prevBtn').style.display = currentIndex === 0 ? 'none' : 'inline-block';
        }

        function revealAnswer() {
            const answerDiv = document.getElementById('answerReveal');
            if (answerDiv) {
                answerDiv.style.display = 'block';
                answerRevealed = true;
                document.getElementById('showAnswerBtn').textContent = '✓ Answer Shown';
                
                // Highlight correct answer
                const question = questions[currentIndex];
                const options = document.querySelectorAll('.option');
                options.forEach(option => {
                    if (option.textContent === question.correct_answer) {
                        option.classList.add('correct');
                    }
                });
            }
        }

        function previousQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                loadQuestion();
            }
        }

        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                loadQuestion();
            }
        }

        function loadNewQuestions() {
            loadStudyQuestions();
        }

        // Initialize
        loadStudyQuestions();
    </script>
</body>
</html>
