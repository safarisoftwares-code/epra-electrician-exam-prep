<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Register - EPRA</title><link rel="stylesheet" href="../css/style.css"></head><body><nav class="navbar"><h2>Register</h2><a href="../index.html" class="btn btn-outline">Home</a></nav><div class="form-container"><h2 style="text-align:center;color:#1a237e">Create Account</h2><form id="f"><input type="text" id="username" placeholder="Username" required><input type="email" id="email" placeholder="Email" required><input type="text" id="full_name" placeholder="Full Name" required><input type="password" id="password" placeholder="Password" required><select id="cert"><option value="Class C">Class C (Domestic)</option><option value="Class B">Class B (Commercial)</option><option value="Class A">Class A (HV)</option></select><label><input type="checkbox" id="terms" required> Accept <a href="../../legal/terms-of-use.html" target="_blank">Terms</a></label><label><input type="checkbox" id="privacy" required> Accept <a href="../../legal/privacy-policy.html" target="_blank">Privacy</a></label><button type="submit" class="btn btn-primary">Register</button></form><p style="text-align:center;margin-top:15px">Have account? <a href="login.html">Login</a></p><p id="msg" style="color:red;text-align:center"></p></div><script>document.getElementById("f").addEventListener("submit",async(e)=>{e.preventDefault();try{const r=await fetch("http://localhost:5000/api/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:document.getElementById("username").value,email:document.getElementById("email").value,full_name:document.getElementById("full_name").value,password:document.getElementById("password").value,certification_class:document.getElementById("cert").value,accepted_terms:document.getElementById("terms").checked,accepted_privacy:document.getElementById("privacy").checked})});const d=await r.json();r.ok?(localStorage.setItem("access_token",d.access_token),window.location.href="dashboard.html"):document.getElementById("msg").textContent=d.error}catch(err){document.getElementById("msg").textContent="Server not running?"}});</script></body></html>
