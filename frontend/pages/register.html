<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EPRA Exam Prep</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span>⚡ EPRA Exam Prep</span>
            </div>
            <a href="../index.html" class="btn btn-outline">← Home</a>
        </div>
    </nav>

    <div class="form-container">
        <h2>Create Account</h2>
        
        <div id="message-container"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" class="form-control" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Choose a username" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number (optional)</label>
                <input type="tel" id="phone" class="form-control" placeholder="e.g., 0712345678">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Create a password" required minlength="6">
            </div>
            
            <div class="form-group">
                <label for="certification_class">Certification Class</label>
                <select id="certification_class" class="form-control" required>
                    <option value="Class C">Class C - Domestic Installer</option>
                    <option value="Class B">Class B - Commercial Installer</option>
                    <option value="Class A">Class A - High Voltage</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="experience_years">Years of Experience</label>
                <input type="number" id="experience_years" class="form-control" value="0" min="0" max="50">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem;">
            Already have an account? <a href="login.html" style="color: #ff9800;">Login here</a>
        </p>
    </div>

    <script src="../js/app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                full_name: document.getElementById('full_name').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value,
                certification_class: document.getElementById('certification_class').value,
                experience_years: parseInt(document.getElementById('experience_years').value) || 0
            };
            
            try {
                const data = await EPRA.apiRequest('/auth/register', 'POST', formData, 'student');
                
                // Store token
                EPRA.setToken(data.access_token, 'student');
                
                // Show success and redirect
                EPRA.showMessage('Registration successful! Redirecting...', 'success', 'message-container');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
            } catch (error) {
                EPRA.showMessage(error.message || 'Registration failed', 'error', 'message-container');
            }
        });
    </script>
</body>
</html>
